# DataAutomated.io — local development environment (CLAUDE.md §15, OR-01)
# `docker-compose up` MUST start all service stubs (Phase-1 exit criterion).
# One container per service (ADR-008). Production overrides live in docker-compose.prod.yml.

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: da_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dataautomated}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_locally}
      POSTGRES_DB: ${POSTGRES_DB:-dataautomated}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dataautomated} -d ${POSTGRES_DB:-dataautomated}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: da_backend
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    # Live-reload of the app code during local dev.
    volumes:
      - ./backend/app:/app/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: da_frontend
    env_file:
      - .env
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    ports:
      - "3000:3000"
    depends_on:
      - backend

  n8n:
    image: n8nio/n8n:latest
    container_name: da_n8n
    environment:
      N8N_BASIC_AUTH_ACTIVE: ${N8N_BASIC_AUTH_ACTIVE:-true}
      N8N_BASIC_AUTH_USER: ${N8N_BASIC_AUTH_USER:-admin}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_BASIC_AUTH_PASSWORD:-change_me_locally}
      N8N_HOST: ${N8N_HOST:-localhost}
      N8N_PORT: ${N8N_PORT:-5678}
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
      # Exported, version-controlled workflows (CLAUDE.md §13).
      - ./n8n/workflows:/workflows

volumes:
  pgdata:
  n8n_data:
