# DataAutomated.io — local development environment (CLAUDE.md §15, OR-01)
# `docker-compose up` MUST start all service stubs (Phase-1 exit criterion).
# One container per service (ADR-008). Production overrides live in docker-compose.prod.yml.

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: da_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dataautomated}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_locally}
      POSTGRES_DB: ${POSTGRES_DB:-dataautomated}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dataautomated} -d ${POSTGRES_DB:-dataautomated}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: da_backend
    env_file:
      - .env
    environment:
      # Compose-network topology (not a secret): churn alerts go to the n8n container.
      N8N_WEBHOOK_URL: http://n8n:5678
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    # Live-reload of the app code during local dev.
    volumes:
      - ./backend/app:/app/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Inlined into client bundles at next-build time (see frontend/Dockerfile).
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    container_name: da_frontend
    env_file:
      - .env
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      # Runtime-only: SSR fetches reach the backend over the compose network.
      API_URL_INTERNAL: http://backend:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

  n8n:
    image: n8nio/n8n:latest
    container_name: da_n8n
    env_file:
      - .env
    environment:
      N8N_BASIC_AUTH_ACTIVE: ${N8N_BASIC_AUTH_ACTIVE:-true}
      N8N_BASIC_AUTH_USER: ${N8N_BASIC_AUTH_USER:-admin}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_BASIC_AUTH_PASSWORD:-change_me_locally}
      N8N_HOST: ${N8N_HOST:-localhost}
      N8N_PORT: ${N8N_PORT:-5678}
      N8N_BLOCK_ENV_ACCESS_IN_NODE: "false"
      N8N_ENV_VARS_ALLOW_ALL: "true"
      # Workflows reach the backend over the compose network via {{$env.BACKEND_URL}}.
      BACKEND_URL: http://backend:8000
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
      # Exported, version-controlled workflows (CLAUDE.md §13).
      - ./n8n/workflows:/workflows:ro
    # Auto-import all workflow JSONs from /workflows before starting n8n.
    # Idempotent: re-importing an existing workflow ID updates it in-place.
    # || true ensures n8n starts even if no workflows exist yet.
    entrypoint: /bin/sh
    command: >
      -c "n8n import:workflow --separate --input=/workflows/ || true && exec n8n"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5678/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  minio:
    image: quay.io/minio/minio:latest
    container_name: da_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

volumes:
  pgdata:
  n8n_data:
  minio_data:
