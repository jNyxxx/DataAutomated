# DataAutomated.io — production overrides (CLAUDE.md §15)
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up
#
# In real production the services run on AWS ECS Fargate (ADR-008): the backend
# autoscales 2->10 behind an ALB, the frontend behind CloudFront, the database is
# RDS (pg16 + pgvector), and n8n is a single task with persistent EFS storage.
# This file documents the production-shaped overrides for image-based, no-reload runs.

services:
  db:
    # In production the database is AWS RDS, NOT a container. This stanza is only
    # for staging/parity runs; production deployments point DATABASE_* at RDS.
    restart: unless-stopped
    ports: []   # do not expose Postgres publicly

  backend:
    # Production runs prebuilt images from ECR (no local source mount, no --reload).
    build: !reset null
    image: ${ECR_BACKEND_IMAGE:-dataautomated/backend:latest}
    volumes: []
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4
    restart: unless-stopped
    environment:
      # Secrets are injected from AWS Secrets Manager in real deploys (SR-03).
      ENV: production
      APP_ENV: production

  frontend:
    build: !reset null
    image: ${ECR_FRONTEND_IMAGE:-dataautomated/frontend:latest}
    restart: unless-stopped
    environment:
      NODE_ENV: production

  n8n:
    # Single instance + persistent storage (RISK-11 stateful exception, ADR-008).
    restart: unless-stopped
    # Auto-import version-controlled workflows from EFS on every container start.
    # Idempotent: re-importing an existing workflow ID updates it in-place.
    # EFS path for workflows: mount n8n_workflows_efs at /workflows (read-only).
    # First-deploy: copy n8n/workflows/*.json to the EFS /workflows path via
    # `aws ecs execute-command` or an init task before starting the n8n service.
    entrypoint: /bin/sh
    command: >
      -c "n8n import:workflow --separate --input=/workflows/ || true && n8n update:workflow --id=wf-daily-feedback-ingestion --active=true || true && n8n update:workflow --id=wf-competitive-signal-monitor --active=true || true && n8n update:workflow --id=wf-weekly-report-generation --active=true || true && n8n update:workflow --id=wf-churn-alert-webhook --active=true || true && exec n8n"
    volumes:
      - n8n_efs:/home/node/.n8n
      # Workflows come from EFS on AWS (populated from n8n/workflows/ in CI/deploy step).
      # Mount as :ro — n8n writes its database to /home/node/.n8n, not /workflows.
      - n8n_workflows_efs:/workflows:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5678/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

volumes:
  n8n_efs:
    # Bind to an existing EFS volume in production via docker volume create --driver local
    # with appropriate EFS mount options, or use the ECS task definition's volume stanzas
    # (see .github/ecs/n8n-task-definition.json — the EFS VolumeConfiguration there is
    # authoritative for Fargate; this entry is for docker compose parity runs only).
    external: false
  n8n_workflows_efs:
    # Populated from n8n/workflows/*.json by the deploy pipeline before n8n starts.
    external: false
