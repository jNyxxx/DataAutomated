<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DataAutomated — Intelligence</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; }
  *{scrollbar-width:thin;scrollbar-color:#334155 transparent;}
  *::-webkit-scrollbar{width:8px;height:8px;}
  *::-webkit-scrollbar-thumb{background:#334155;border-radius:9999px;}
  @keyframes spin{to{transform:rotate(360deg)}}
  .spin{animation:spin .8s linear infinite;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
  .pulse{animation:pulse 1.3s ease-in-out infinite;}
  /* overlay entrance — resting state is fully visible; animation is enhancement only */
  @keyframes ovFade{from{opacity:0}to{opacity:1}}
  @keyframes ovSlide{from{transform:translateX(100%)}to{transform:translateX(0)}}
  @keyframes toastIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  .ov-fade{animation:ovFade .18s ease both;}
  .ov-slide{animation:ovSlide .2s ease-out both;}
  .toast-in{animation:toastIn .2s ease both;}
</style>
</head>
<body class="h-full bg-slate-900 text-slate-200 antialiased">

<!-- ============ GLOBAL ALERT BANNER (non-dismissible, health-driven) ============ -->
<div id="alertBanner" role="alert" class="flex items-center gap-3 bg-red-500/10 px-4 py-2.5 text-sm text-red-200 ring-1 ring-inset ring-red-500/20">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" class="size-4 shrink-0 text-red-400"><path d="M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0Z"/><path d="M12 9v4M12 17h.01"/></svg>
  <p class="min-w-0 flex-1 truncate">Mixpanel auth expired — Journey event ingestion is paused.</p>
  <a href="#" data-nav="settings" class="shrink-0 rounded-md bg-red-500/15 px-2.5 py-1 text-xs font-medium text-red-200 hover:bg-red-500/25 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-blue-500">Reconnect</a>
</div>

<div class="flex h-[calc(100%-41px)]">
  <!-- ============ SIDEBAR ============ -->
  <aside class="hidden w-64 shrink-0 flex-col bg-slate-900 md:flex">
    <div class="flex items-center gap-2 px-5 py-5">
      <span class="text-base font-semibold tracking-tight text-white">Data<span class="text-blue-400">●</span>Automated</span>
    </div>
    <nav id="nav" class="flex-1 space-y-6 overflow-y-auto px-3 py-2 text-sm"></nav>
    <div class="relative p-3">
      <button class="flex w-full items-center gap-3 rounded-lg px-2 py-2 text-left hover:bg-slate-800 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-blue-500">
        <span class="grid size-8 shrink-0 place-items-center rounded-lg bg-blue-500/15 text-sm font-semibold text-blue-300">A</span>
        <span class="min-w-0 flex-1">
          <span class="block truncate text-sm font-medium text-slate-200">Acme SaaS Inc.</span>
          <span class="block truncate text-xs text-slate-400">Intelligence Core</span>
        </span>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" class="size-4 shrink-0 text-slate-400"><path d="m6 9 6 6 6-6"/></svg>
      </button>
    </div>
  </aside>

  <!-- ============ MAIN ============ -->
  <main class="min-w-0 flex-1 overflow-y-auto">
    <div id="screens" class="mx-auto w-full max-w-7xl px-4 py-6 sm:px-6 lg:px-8"></div>
  </main>
</div>

<!-- ============ OVERLAY + TOAST ROOTS ============ -->
<div id="overlayRoot"></div>
<div id="toastRoot" class="pointer-events-none fixed bottom-5 right-5 z-[100] flex flex-col gap-2"></div>

<script>
/* ----------------------------- shared helpers ----------------------------- */
const BADGE = {
  neutral:"bg-slate-700/40 text-slate-300", success:"bg-green-500/10 text-green-400",
  warning:"bg-amber-500/10 text-amber-400", critical:"bg-red-500/10 text-red-400",
  high:"bg-orange-500/10 text-orange-400", info:"bg-sky-500/10 text-sky-400",
  voc:"bg-teal-500/10 text-teal-300", comp:"bg-rose-500/10 text-rose-300",
  jrn:"bg-blue-500/10 text-blue-300", system:"bg-slate-500/15 text-slate-300",
};
const DOT = {
  neutral:"bg-slate-400", success:"bg-green-400", warning:"bg-amber-400", critical:"bg-red-400",
  high:"bg-orange-400", info:"bg-sky-400", voc:"bg-teal-400", comp:"bg-rose-400", jrn:"bg-blue-400", system:"bg-slate-400",
};
function badge(text, variant="neutral", dot=false){
  return `<span class="inline-flex items-center gap-1.5 rounded-full px-2.5 py-0.5 text-xs font-medium leading-5 whitespace-nowrap ${BADGE[variant]}">${dot?`<span class="size-1.5 rounded-full ${DOT[variant]}"></span>`:""}${text}</span>`;
}
const FOCUS = "focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-blue-500";
function btn(label, variant="default", extra=""){
  const v = variant==="primary"?"bg-blue-600 text-white hover:bg-blue-500":variant==="ghost"?"bg-transparent text-slate-300 hover:bg-slate-800 hover:text-slate-100":"bg-slate-800 text-slate-100 hover:bg-slate-700";
  return `<button class="inline-flex h-8 items-center justify-center gap-2 rounded-lg px-3 text-sm font-medium transition-colors ${v} ${FOCUS} ${extra}">${label}</button>`;
}

/* ----------------------------- overlays + toasts ----------------------------- */
const X_ICON = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" class="size-5"><path d="M18 6 6 18M6 6l12 12"/></svg>`;
const CHECK_ICON = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="size-4"><path d="M20 6 9 17l-5-5"/></svg>`;
const SPIN = `<span class="inline-block size-4 shrink-0 rounded-full border-2 border-current border-t-transparent spin"></span>`;

let overlayCloseTimer=null;
function closeOverlay(){
  const r=document.getElementById("overlayRoot");
  const panel=r.querySelector("[data-panel]");
  if(!panel){ r.innerHTML=""; return; }
  panel.style.opacity="0"; const so=panel.querySelector("[data-slideover]"); if(so) so.style.transform="translateX(100%)";
  clearTimeout(overlayCloseTimer);
  overlayCloseTimer=setTimeout(()=>{ r.innerHTML=""; }, 180);
}
function openModal(title, bodyHtml, footerHtml=""){
  clearTimeout(overlayCloseTimer);
  const r=document.getElementById("overlayRoot");
  r.innerHTML=`<div data-panel class="fixed inset-0 z-50 flex items-center justify-center p-4">
    <div data-backdrop class="absolute inset-0 bg-black/50 backdrop-blur-sm"></div>
    <div class="relative z-10 w-full max-w-md overflow-hidden rounded-2xl bg-slate-800 shadow-2xl shadow-black/50 ring-1 ring-white/10">
      <div class="flex items-center justify-between gap-3 px-5 py-4">
        <h3 class="text-base font-semibold text-white">${title}</h3>
        <button data-close class="rounded-lg p-1.5 text-slate-400 hover:bg-slate-700 hover:text-white ${FOCUS}">${X_ICON}</button>
      </div>
      <div class="px-5 pb-1">${bodyHtml}</div>
      ${footerHtml?`<div class="mt-4 flex justify-end gap-2 bg-slate-900/40 px-5 py-4">${footerHtml}</div>`:`<div class="h-4"></div>`}
    </div></div>`;
}
function openSlideOver(title, sub, bodyHtml, footerHtml=""){
  clearTimeout(overlayCloseTimer);
  const r=document.getElementById("overlayRoot");
  r.innerHTML=`<div data-panel class="fixed inset-0 z-50">
    <div data-backdrop class="absolute inset-0 bg-black/50 backdrop-blur-sm"></div>
    <div data-slideover class="absolute right-0 top-0 flex h-full w-full max-w-md flex-col bg-slate-800 shadow-2xl shadow-black/50 ring-1 ring-white/10">
      <div class="flex items-start justify-between gap-3 px-5 py-4">
        <div class="min-w-0"><h3 class="text-base font-semibold text-white">${title}</h3>${sub?`<p class="mt-0.5 text-sm text-slate-400">${sub}</p>`:""}</div>
        <button data-close class="rounded-lg p-1.5 text-slate-400 hover:bg-slate-700 hover:text-white ${FOCUS}">${X_ICON}</button>
      </div>
      <div class="min-h-0 flex-1 overflow-y-auto px-5 py-2">${bodyHtml}</div>
      ${footerHtml?`<div class="flex justify-end gap-2 bg-slate-900/40 px-5 py-4">${footerHtml}</div>`:""}
    </div></div>`;
}
function showToast(msg, variant="success"){
  const tint=variant==="success"?"text-green-400":variant==="info"?"text-sky-400":"text-slate-300";
  const icon=variant==="success"?CHECK_ICON:"";
  const root=document.getElementById("toastRoot");
  const t=document.createElement("div");
  t.className="pointer-events-auto flex items-center gap-2.5 rounded-xl border border-slate-700 bg-slate-800 px-4 py-3 text-sm text-slate-100 shadow-xl shadow-black/40";
  t.innerHTML=`<span class="grid size-5 place-items-center rounded-full bg-green-500/15 ${tint}">${icon||CHECK_ICON}</span><span>${msg}</span>`;
  root.appendChild(t);
  setTimeout(()=>{ t.style.opacity="0"; setTimeout(()=>t.remove(),200); }, 2600);
}
/* generic button → spinner → action (simulates async S3 / network) */
function withLoading(el, doneMsg, after){
  if(el.dataset.busy) return; el.dataset.busy="1";
  const orig=el.innerHTML; el.innerHTML=`${SPIN}<span>Working…</span>`; el.classList.add("opacity-90");
  setTimeout(()=>{ el.innerHTML=orig; el.classList.remove("opacity-90"); delete el.dataset.busy; if(doneMsg) showToast(doneMsg); if(after) after(); }, 1300);
}
function searchWell(ph){
  return `<label class="flex h-9 items-center gap-2 rounded-lg bg-slate-950/50 px-3 text-sm ring-1 ring-inset ring-slate-800 focus-within:ring-2 focus-within:ring-blue-500">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" class="size-4 text-slate-500"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
    <input type="search" placeholder="${ph}" class="w-40 bg-transparent text-slate-200 outline-none placeholder:text-slate-500 sm:w-56"></label>`;
}
function filterWell(label, opts){
  return `<div class="relative flex h-9 items-center rounded-lg bg-slate-950/50 text-sm ring-1 ring-inset ring-slate-800 focus-within:ring-2 focus-within:ring-blue-500">
    <span class="pointer-events-none pl-3 text-slate-500">${label}:</span>
    <select class="h-full cursor-pointer appearance-none bg-transparent py-0 pl-1.5 pr-8 text-slate-200 outline-none">${opts.map(o=>`<option class="bg-slate-900">${o}</option>`).join("")}</select>
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" class="pointer-events-none absolute right-2.5 size-4 text-slate-500"><path d="m6 9 6 6 6-6"/></svg></div>`;
}
/* flat charts (no borders, no boxed points) */
function sparkline(points, color, h=40){
  const w=120,max=Math.max(...points),min=Math.min(...points);
  const X=i=>i*(w/(points.length-1)), Y=v=>h-3-((v-min)/((max-min)||1))*(h-6);
  const d=points.map((v,i)=>(i?'L':'M')+X(i).toFixed(1)+' '+Y(v).toFixed(1)).join(' ');
  return `<svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="none" class="w-full" style="height:${h}px">
    <path d="${d} L${w} ${h} L0 ${h} Z" fill="${color}" fill-opacity="0.14"/>
    <path d="${d}" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
}
function velocity(data, color){
  const w=240,h=96,pad=18,max=Math.max(...data.map(d=>d.count))*1.15,bw=(w-pad*2)/data.length;
  const bars=data.map((d,i)=>{const bh=(d.count/max)*(h-pad*2),x=pad+i*bw+bw*0.18,y=h-pad-bh,ww=bw*0.64;
    return `<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${ww.toFixed(1)}" height="${bh.toFixed(1)}" rx="3" fill="${color}" fill-opacity="0.8"/>
    <text x="${(x+ww/2).toFixed(1)}" y="${h-5}" text-anchor="middle" fill="#94a3b8" font-size="10">${d.day}</text>`;}).join("");
  return `<svg viewBox="0 0 ${w} ${h}" class="w-full" style="height:${h}px">${bars}</svg>`;
}
function donut(segs){
  const r=38,c=2*Math.PI*r;let acc=0;
  const arcs=segs.map(s=>{const frac=s.v/100,dash=frac*c;const el=`<circle cx="50" cy="50" r="${r}" fill="none" stroke="${s.color}" stroke-width="16" stroke-dasharray="${dash.toFixed(1)} ${(c-dash).toFixed(1)}" stroke-dashoffset="${(-acc).toFixed(1)}" transform="rotate(-90 50 50)"/>`;acc+=dash;return el;}).join("");
  return `<svg viewBox="0 0 100 100" class="size-28">${arcs}</svg>`;
}
function gauge(value, color){
  const r=46,c=Math.PI*r,off=c*(1-value);
  return `<svg viewBox="0 0 112 70" class="w-full" style="height:96px">
    <path d="M10 60 A46 46 0 0 1 102 60" fill="none" stroke="#334155" stroke-width="10" stroke-linecap="round"/>
    <path d="M10 60 A46 46 0 0 1 102 60" fill="none" stroke="${color}" stroke-width="10" stroke-linecap="round" stroke-dasharray="${c.toFixed(1)}" stroke-dashoffset="${off.toFixed(1)}"/></svg>`;
}
const TINT={voc:"#2dd4bf",comp:"#f43f5e",jrn:"#3b82f6",system:"#94a3b8"};

/* ----------------------------- nav ----------------------------- */
const NAV=[
  {group:"Overview",items:[{id:"dashboard",label:"Dashboard"}]},
  {group:"Intelligence",items:[
    {id:"insights",label:"Voice of Customer",dot:"bg-teal-400"},
    {id:"signals",label:"Competitive Signals",dot:"bg-rose-400",count:3},
    {id:"journeys",label:"Journey Intelligence",dot:"bg-blue-400"},
    {id:"reports",label:"Reports"},
  ]},
  {group:"Workspace",items:[{id:"settings",label:"Settings & Sources"}]},
];
/* lucide-style inline icons (24x24, 1.75 stroke) keyed to each nav item */
const NAV_ICONS = {
  dashboard: `<rect x="3" y="3" width="7" height="9" rx="1.5"/><rect x="14" y="3" width="7" height="5" rx="1.5"/><rect x="14" y="12" width="7" height="9" rx="1.5"/><rect x="3" y="16" width="7" height="5" rx="1.5"/>`,
  insights: `<path d="M21 15a2 2 0 0 1-2 2H8l-4 4V5a2 2 0 0 1 2-2h13a2 2 0 0 1 2 2z"/>`,
  signals: `<circle cx="12" cy="12" r="1.5"/><path d="M12 2a10 10 0 1 0 10 10"/><path d="M12 12 19 5"/><path d="M12 12a4 4 0 1 0 4 4"/>`,
  journeys: `<circle cx="6" cy="19" r="2.5"/><circle cx="18" cy="5" r="2.5"/><path d="M8.5 19H14a4 4 0 0 0 0-8H10a4 4 0 0 1 0-8h5.5"/>`,
  reports: `<path d="M14 3H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8z"/><path d="M14 3v5h5M9 13h6M9 17h6"/>`,
  settings: `<circle cx="12" cy="12" r="3.2"/><path d="M19.4 13a1.7 1.7 0 0 0 .3 1.9l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-2.9 1.2V21a2 2 0 1 1-4 0v-.1A1.7 1.7 0 0 0 7 19.2l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1A1.7 1.7 0 0 0 3 13a2 2 0 1 1 0-4 1.7 1.7 0 0 0 1.8-2.6l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1A1.7 1.7 0 0 0 11 3.1V3a2 2 0 1 1 4 0v.1a1.7 1.7 0 0 0 2.9 1.2l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1A1.7 1.7 0 0 0 20.9 11H21a2 2 0 1 1 0 4z"/>`,
};
function navIcon(id, active){
  return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" class="h-5 w-5 shrink-0 transition-colors ${active?"text-white":"text-slate-500 group-hover:text-slate-300"}">${NAV_ICONS[id]||""}</svg>`;
}
let current="dashboard";
function renderNav(){
  document.getElementById("nav").innerHTML = NAV.map((g,gi)=>`
    <div><p class="px-3 mb-2 ${gi===0?"mt-2":"mt-6"} text-[10px] font-semibold uppercase tracking-widest text-slate-500">${g.group}</p>
    <ul class="space-y-0.5">${g.items.map(it=>`
      <li><button data-nav="${it.id}" class="group flex w-full items-center gap-3 rounded-lg px-3 py-2 text-left text-sm transition-colors ${FOCUS} ${it.id===current?"bg-slate-800 font-medium text-white":"text-slate-400 hover:bg-slate-800/50 hover:text-slate-200"}">
        ${navIcon(it.id, it.id===current)}
        <span class="flex-1 truncate">${it.label}</span>
        ${it.count?`<span class="shrink-0 rounded-full bg-rose-500/15 px-1.5 text-xs font-medium text-rose-300">${it.count}</span>`:it.dot?`<span class="size-2 shrink-0 rounded-full ${it.dot}"></span>`:""}
      </button></li>`).join("")}</ul></div>`).join("");
}

/* ----------------------------- screens ----------------------------- */
function header(title, sub, right=""){
  return `<header class="flex flex-wrap items-center gap-4">
    <div class="min-w-0"><h1 class="truncate text-2xl font-semibold tracking-tight text-white">${title}</h1>
    <p class="mt-0.5 truncate text-sm text-slate-400">${sub}</p></div>
    ${right?`<div class="ml-auto flex items-center gap-2">${right}</div>`:""}</header>`;
}

/* ---- DASHBOARD ---- */
function dashboard(){
  const kpis=[
    {label:"VoC Sentiment",stream:"voc",value:"+0.42",delta:"0.08 vs last wk",dir:"up",spark:[3,4,3,5,4,6,6,7]},
    {label:"Churn Risk",stream:"voc",value:"18%",delta:"4 pts — watch",dir:"down",spark:[2,2,3,3,4,5,6,7]},
    {label:"New Signals (48h)",stream:"comp",value:"12",delta:"3 critical",dir:"down",spark:[4,3,5,4,6,5,7,9]},
    {label:"Top Funnel Drop",stream:"jrn",value:"54%",delta:"Checkout step",dir:"down",spark:[6,6,7,6,8,7,8,9]},
    {label:"Agent Runs (24h)",stream:"system",value:"38",delta:"all healthy",dir:"up",spark:[5,6,5,7,6,7,8,8]},
  ];
  const attention=[
    {stream:"voc",su:"critical",title:"Churn risk on Growth cohort jumped to 28%",meta:["VoC · Churn Early Warning","driver: pricing confusion","14m ago"]},
    {stream:"comp",su:"critical",title:'Rival "Northbeam" cut Pro pricing 30%',meta:["Competitive · pricing","source: pricing page","1h ago"]},
    {stream:"jrn",su:"high",title:"Checkout drop-off spiked to 54% on mobile",meta:["Journey · ux_friction","projected lift +9%","2h ago"]},
    {stream:"comp",su:"high",title:'"Northbeam" posted 6 enterprise AE roles',meta:["Competitive · hiring","source: LinkedIn","5h ago"]},
    {stream:"voc",su:"med",title:"Rising theme: onboarding setup time (42 mentions)",meta:["VoC · theme","sentiment −0.3","8h ago"]},
  ];
  const SU={critical:["CRIT","critical"],high:["HIGH","high"],med:["MED","warning"],low:["LOW","neutral"]};
  const SL={voc:"VoC",comp:"Competitive",jrn:"Journey",system:"System"};
  const runs=[["Sentiment cluster","ok","6m"],["Competitive scrape","running","now"],["Funnel rollup","ok","18m"],["Briefing generator","ok","1h"]];
  const RB={ok:["OK","success"],running:["SYNCING","info"],error:["ERROR","critical"]};
  const sources=[["Zendesk","ok","synced 6m ago"],["Intercom","stale","last sync 3d ago"],["News API","syncing","syncing now…"],["Mixpanel","error","auth expired"]];
  const SB={ok:["OK","success"],syncing:["SYNCING","info"],stale:["STALE","warning"],error:["ERROR","critical"],off:["OFF","neutral"]};
  const funnel=[{l:"Landing page",pct:100,n:"12,400"},{l:"Sign-up start",pct:72,n:"8,928"},{l:"Account created",pct:61,n:"7,564"},{l:"Activation",pct:58,n:"7,192"},{l:"Checkout start",pct:41,n:"5,084"},{l:"Purchase",pct:19,n:"2,356",crit:true}];

  const dateOpts=["Last 7 days","Last 30 days","Last 90 days","Year to date"];
  return `
  ${header("Dashboard","Acme SaaS Inc. · all data live",
    `<div class="relative" data-datemenu>
      <button data-datebtn class="flex h-9 items-center gap-2 rounded-lg bg-slate-950/50 px-3 text-sm text-slate-200 ring-1 ring-inset ring-slate-800 hover:ring-slate-600 ${FOCUS}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" class="size-4 text-slate-500"><rect x="3" y="4.5" width="18" height="16" rx="2"/><path d="M3 9h18M8 2.5v4M16 2.5v4"/></svg><span data-dateval>Last 30 days</span>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" class="size-4 text-slate-500"><path d="m6 9 6 6 6-6"/></svg></button>
      <div data-datelist class="absolute right-0 z-30 mt-2 hidden w-44 overflow-hidden rounded-xl bg-slate-800 shadow-[inset_0_1px_0_0_rgba(255,255,255,0.05)] py-1 shadow-xl shadow-black/40 ring-1 ring-white/10">
        ${dateOpts.map(o=>`<button data-dateopt="${o}" class="flex w-full items-center justify-between px-3 py-2 text-left text-sm text-slate-300 hover:bg-slate-700/60 hover:text-white ${FOCUS}">${o}${o==="Last 30 days"?`<span class="text-blue-400">${CHECK_ICON}</span>`:""}</button>`).join("")}
      </div></div>`)}

  <!-- KPI row · no borders -->
  <div class="mt-5 grid grid-cols-2 gap-4 sm:grid-cols-3 lg:grid-cols-5">
    ${kpis.map(k=>`<section class="rounded-xl bg-slate-800 shadow-[inset_0_1px_0_0_rgba(255,255,255,0.05)] p-4">
      <div class="flex items-center gap-2"><span class="size-2 shrink-0 rounded-full ${DOT[k.stream]}"></span><span class="truncate text-xs text-slate-400">${k.label}</span></div>
      <div class="mt-2 text-2xl font-semibold tabular-nums text-white">${k.value}</div>
      <div class="mt-0.5 truncate text-xs ${k.dir==="up"?"text-emerald-400":"text-rose-400"}">${k.dir==="up"?"▲":"▼"} ${k.delta}</div>
      <div class="mt-3">${sparkline(k.spark,TINT[k.stream],36)}</div>
    </section>`).join("")}
  </div>

  <!-- Needs attention · inset rows, focus ring -->
  <section class="mt-5 rounded-xl bg-slate-800 shadow-[inset_0_1px_0_0_rgba(255,255,255,0.05)] p-5">

/* generation progress simulation (demonstrates the SSE-ready component live) */
let genTimer=null;
function startGen(){
  const nodes=[["Synthesizing sources","done"],["Clustering themes & signals","active"],["Drafting executive narrative","pending"],["Rendering PDF + Slack digest","pending"]];
  let pct=28, idx=1;
  const draw=()=>{
    const ol=document.getElementById("genNodes"); if(!ol) return;
    ol.innerHTML=nodes.map(n=>{
      const mark=n[1]==="done"?`<span class="grid size-5 place-items-center rounded-full bg-blue-500/15 text-blue-400">✓</span>`:n[1]==="active"?`<span class="grid size-5 place-items-center rounded-full bg-blue-500/15"><span class="size-2 rounded-full bg-blue-400 pulse"></span></span>`:`<span class="size-5 rounded-full ring-1 ring-inset ring-slate-700"></span>`;
      const txt=n[1]==="done"?"text-slate-400 line-through decoration-slate-600":n[1]==="active"?"font-medium text-slate-100":"text-slate-500";
      return `<li class="flex items-center gap-3"><span class="shrink-0">${mark}</span><span class="truncate ${txt}">${n[0]}</span></li>`;
    }).join("");
    const lbl=document.getElementById("genLabel"); if(lbl) lbl.querySelector("span:last-child").textContent=(nodes.find(n=>n[1]==="active")||["Finalizing…"])[0];
    const bar=document.getElementById("genBar"); if(bar) bar.style.width=pct+"%";
    const p=document.getElementById("genPct"); if(p) p.textContent=Math.round(pct)+"%";
  };
  clearInterval(genTimer);
  genTimer=setInterval(()=>{
    if(!document.getElementById("genNodes")){clearInterval(genTimer);return;}
    pct=Math.min(100,pct+7);
    if(pct>55&&nodes[1][1]==="active"){nodes[1][1]="done";nodes[2][1]="active";}
    if(pct>85&&nodes[2][1]==="active"){nodes[2][1]="done";nodes[3][1]="active";}
    if(pct>=100){nodes[3][1]="done";clearInterval(genTimer);}
    draw();
  },1500);
  draw();
}

      `<button data-close class="inline-flex h-9 items-center rounded-lg px-3 text-sm font-medium text-slate-300 hover:bg-slate-700 ${FOCUS}">Cancel</button>
       <button data-savecomp class="inline-flex h-9 items-center gap-2 rounded-lg bg-blue-600 px-4 text-sm font-medium text-white hover:bg-blue-500 ${FOCUS}">Add competitor</button>`);
    setTimeout(()=>{const i=document.getElementById("compInput");if(i)i.focus();},220);
    return;
  }
  const sc=e.target.closest("[data-savecomp]");
  if(sc){
    const val=(document.getElementById("compInput")||{}).value||"";
    if(!val.trim()){ showToast("Enter a domain","info"); return; }
    withLoading(sc,"Now tracking "+val.trim(),()=>{
      const list=document.querySelector("[data-trackedlist]");
      if(list) list.insertAdjacentHTML("afterbegin",`<li class="flex items-center justify-between gap-3 py-2 text-sm"><span class="truncate text-slate-200">${val.trim()}</span>${badge("new","info")}</li>`);
      closeOverlay();
    });
    return;
  }

  /* ---- SETTINGS: source ··· menu ---- */
  const sb=e.target.closest("[data-srcbtn]");
  if(sb){ const list=sb.parentElement.querySelector("[data-srclist]"); document.querySelectorAll("[data-srclist]").forEach(l=>{if(l!==list)l.classList.add("hidden")}); list.classList.toggle("hidden"); const dc=list.querySelector("[data-srcaction^='disconnect']"); if(dc){dc.dataset.armed="";dc.classList.remove("bg-red-500/15","font-medium");dc.querySelector("span").textContent="Disconnect";} e.stopPropagation(); return; }
  const sa=e.target.closest("[data-srcaction]");
  if(sa){
    const [action,name]=sa.getAttribute("data-srcaction").split(":");
    if(action==="disconnect"){
      /* two-step guard: first click arms, second click fires */
      if(sa.dataset.armed!=="1"){
        sa.dataset.armed="1";
        sa.classList.add("bg-red-500/15","font-medium");
        sa.querySelector("span").textContent="Confirm disconnect?";
        return;
      }
      document.querySelectorAll("[data-srclist]").forEach(l=>l.classList.add("hidden"));
      const row=sa.closest("tr");
      row.style.transition="opacity .3s"; row.style.opacity="0";
      setTimeout(()=>{ row.remove(); showToast(name+" disconnected","info"); },300);
    } else {
      document.querySelectorAll("[data-srclist]").forEach(l=>l.classList.add("hidden"));
      if(action==="resync"){ showToast("Re-syncing "+name+"…","info"); }
      else { showToast("Opening "+name+" settings","info"); }
    }
    return;
  }

  /* ---- SETTINGS: add connection slide-over ---- */
  const acn=e.target.closest("[data-addconn]");
  if(acn){
    const platforms=[["Zendesk","Support tickets","oauth"],["Intercom","Chat & inbox","oauth"],["Mixpanel","Product events","oauth"],["Stripe","Billing & churn","apikey"],["Segment","Event pipeline","apikey"],["Custom webhook","Any JSON source","apikey"]];
    openSlideOver("Add a connection","Choose a platform and method",`
      <div class="space-y-2 pb-2">${platforms.map(p=>`
        <button data-platform="${p[0]}" data-method="${p[2]}" class="flex w-full items-center gap-3 rounded-lg bg-slate-900/50 p-3 text-left transition-colors hover:bg-slate-900/90 ${FOCUS}">
          <span class="grid size-9 shrink-0 place-items-center rounded-lg bg-slate-700/50 text-xs font-semibold text-slate-200">${p[0][0]}</span>
          <span class="min-w-0 flex-1"><span class="block truncate text-sm font-medium text-slate-100">${p[0]}</span><span class="block truncate text-xs text-slate-400">${p[1]}</span></span>
          ${badge(p[2]==="oauth"?"OAuth":"API Key", p[2]==="oauth"?"success":"info")}
        </button>`).join("")}</div>`);
    return;
  }
  const plat=e.target.closest("[data-platform]");
  if(plat){
    const name=plat.getAttribute("data-platform"), method=plat.getAttribute("data-method");
    if(method==="oauth"){
      openModal("Connect "+name,`
        <div class="py-2 text-center">
          <div class="mx-auto grid size-12 place-items-center rounded-xl bg-slate-700/50 text-base font-semibold text-slate-100">${name[0]}</div>
          <p class="mt-3 text-sm leading-relaxed text-slate-300">You'll be redirected to ${name} to authorize secure access. We never store your password.</p>
        </div>`,
        `<button data-close class="inline-flex h-9 items-center rounded-lg px-3 text-sm font-medium text-slate-300 hover:bg-slate-700 ${FOCUS}">Cancel</button>
         <button data-loadbtn data-toast="${name} connected" class="inline-flex h-9 items-center gap-2 rounded-lg bg-blue-600 px-4 text-sm font-medium text-white hover:bg-blue-500 ${FOCUS}">Authorize with ${name}</button>`);
    } else {
      openModal("Connect "+name,`
        <div class="space-y-4 py-1">
          <label class="block"><span class="mb-1.5 block text-xs font-medium text-slate-400">API key</span>
            <input placeholder="sk_live_••••••••••••" class="h-9 w-full rounded-lg bg-slate-950/50 px-3 font-mono text-sm text-slate-200 ring-1 ring-inset ring-slate-800 placeholder:text-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500"></label>
          <label class="block"><span class="mb-1.5 block text-xs font-medium text-slate-400">Endpoint (optional)</span>
            <input placeholder="https://api.${name.toLowerCase().replace(/[^a-z]/g,'')}.com" class="h-9 w-full rounded-lg bg-slate-950/50 px-3 text-sm text-slate-200 ring-1 ring-inset ring-slate-800 placeholder:text-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500"></label>
        </div>`,
        `<button data-close class="inline-flex h-9 items-center rounded-lg px-3 text-sm font-medium text-slate-300 hover:bg-slate-700 ${FOCUS}">Cancel</button>
         <button data-loadbtn data-toast="${name} connected" class="inline-flex h-9 items-center gap-2 rounded-lg bg-blue-600 px-4 text-sm font-medium text-white hover:bg-blue-500 ${FOCUS}">Save & connect</button>`);
    }
    return;
  }
});
/* close popovers / overlays on outside click + Esc */
document.addEventListener("click",(e)=>{
  if(!e.target.closest("[data-datemenu]")) document.querySelectorAll("[data-datelist]").forEach(l=>l.classList.add("hidden"));
  if(!e.target.closest("[data-srcmenu]")) document.querySelectorAll("[data-srclist]").forEach(l=>l.classList.add("hidden"));
});
document.addEventListener("keydown",(e)=>{ if(e.key==="Escape") closeOverlay(); });
render();
</script>
