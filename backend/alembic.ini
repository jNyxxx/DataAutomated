# Alembic configuration — DataAutomated.io (DATABASE_FOUNDATION.md §5; D3).
# Alembic is the sole schema authority. No production auto-DDL (AUD-04).
# Run from backend/ directory: alembic upgrade head

[alembic]
# Path to migration scripts, relative to this file (backend/alembic/)
script_location = alembic

# sqlalchemy.url is set programmatically in env.py from settings.database_url (AUD-02).
# Never hardcode a DSN here — the value is injected at runtime.
sqlalchemy.url =

# Migration file naming: {rev}_{slug}.py
file_template = %%(rev)s_%%(slug)s
truncate_slug_length = 40

# Versions directory
version_locations = %(here)s/alembic/versions

# Prepend backend/ to sys.path so `from app.X import Y` works in env.py and migration files.
prepend_sys_path = .

[post_write_hooks]
# Optional: uncomment to auto-format generated migrations
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -l 100 REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
